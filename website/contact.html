<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lee Dulcio — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --surface: #0e0e0e;
      --accent: #00ff88;
      --accent-dim: rgba(0, 255, 136, 0.08);
      --accent-border: rgba(0, 255, 136, 0.2);
      --border: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: #bbb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,255,136,0.05) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at center, transparent 30%, #050505 100%);
      pointer-events: none;
      z-index: 0;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
    }

    .back a {
      color: #555;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 2px;
      transition: color 0.2s;
    }

    .back a:hover { color: var(--accent); }

    .card {
      background: var(--surface);
      border-radius: 4px;
      border: 1px solid var(--border);
      padding: 50px 56px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--accent);
      font-size: 2.4rem;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
      margin-bottom: 6px;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(0,255,136,0.4);
      border-radius: 2px;
      margin: 14px auto 36px;
    }

    .blurb {
      font-size: 0.82rem;
      color: #666;
      letter-spacing: 0.5px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .mailto-btn {
      display: inline-block;
      padding: 14px 32px;
      background: transparent;
      border: 1px solid var(--accent-border);
      border-radius: 3px;
      color: var(--accent);
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .mailto-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .email-line {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="back">
    <a href="index.html">← Home</a>
  </div>

  <div class="card">
    <h1>CONTACT</h1>
    <div class="divider"></div>
    <p class="blurb">Open to new opportunities, collaborations,<br>and interesting problems.</p>
    <a class="mailto-btn" href="mailto:leedulcio@gorillac.net">Send Me an Email</a>
    <p class="email-line">leedulcio@gorillac.net</p>
  </div>

</body>
</html>
